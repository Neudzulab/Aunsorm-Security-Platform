# Zasian Media Platform — Minimum Aunsorm Stack
#
# MyeOffice frontend stack bu compose'a şu şekilde bağlanır:
#   nginx gateway → host.docker.internal:50010 → auth-service
#
# MyeOffice'in kullandığı endpoint'ler:
#   POST /security/generate-media-token  — Zasian media JWT üretimi
#   POST /security/jwt-verify            — Zasian token doğrulama
#   POST /security/jwe/encrypt           — JWE zarf şifreleme
#   POST /security/jwe/decrypt           — JWE zarf çözme
#   POST /sfu/context                    — E2EE oturum başlatma
#   POST /sfu/context/step               — E2EE anahtar değişimi adımı
#   POST /oauth/token (client_credentials) — Servis hesabı M2M token
#   POST /oauth/introspect               — Token içgözlem
#   GET  /health                         — Health check
#
# Port Matrisi (MyeOffice uyumu):
#   50010 — nginx Gateway (MyeOffice nginx → host.docker.internal:50010 → gateway → auth-service)
#   50011 — auth-service doğrudan host erişimi
#   50021 — e2ee-service doğrudan host erişimi (Zasian SFU container DNS: aun-e2ee-service:50021)
#   5433  — PostgreSQL (host erişimi, isteğe bağlı)
#
# Zasian SFU (Docker içi) erişim yöntemleri:
#   A) Container DNS: http://aun-auth-service:50011  ← ÖNERİLEN
#      Zasian SFU compose'una ekleyin:
#        networks:
#          aunsorm-network:
#            external: true
#            name: aunsorm-network
#        environment:
#          ZASIAN_WS_AUNSORM_URL: http://aun-auth-service:50011
#          ZASIAN_E2EE_URL: http://aun-e2ee-service:50021
#   B) Host port:  http://HOST_PUBLIC_IP:50011 / :50021
#      (host.docker.internal Linux'ta çalışmıyor!)
#
# Kullanım:
#   cp ../.env.example ../.env   # veya mevcut .env dosyasını düzenleyin
#   docker compose -f docker/compose.zasian-stack.yaml up -d
#
# MyeOffice nginx ayarları (zaten mevcut):
#   nginx.conf:       upstream aunsorm_api { server host.docker.internal:50010; }
#   nginx-https.conf: upstream aunsorm_api { server host.docker.internal:50010; }
#
# MyeOffice environment (docker-compose.yml):
#   AUNSORM_INTERNAL_BASE_URL=http://host.docker.internal:50010
#   NEXT_PUBLIC_AUNSORM_BASE_URL=http://localhost:50047/aunsorm  (gateway proxy)
#
# Ortam değişkenleri (zorunlu):
#   ZASIAN_WEBSOCKET_URL  — Zasian signaling endpoint (örn. wss://HOST:50036/zasian)
#   AUNSORM_CLOCK_ATTESTATION — SecureClockSnapshot JSON (base64 veya ham)
#   AUNSORM_CALIBRATION_FINGERPRINT — Kalibrasyon hex parmak izi
#
# Opsiyonel geçersiz kılmalar:
#   ZASIAN_HOST           — Zasian host (ZASIAN_WEBSOCKET_URL yoksa kullanılır)
#   AUNSORM_SERVICE_CLIENT_SECRET — M2M client secret (varsayılan: aunsorm-service-secret)
#   AUNSORM_TOKEN_TTL_SECS — Token geçerlilik süresi saniyeleri (varsayılan: 3600)

name: aunsorm

networks:
  aunsorm-network:
    name: aunsorm-network
    driver: bridge

services:

  # ─── PostgreSQL — JWT ledger ve refresh token kalıcı depolama ────────────
  postgres:
    image: postgres:16-alpine
    container_name: aun-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aunsorm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aunsorm_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aunsorm_auth}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - aunsorm-pg-data:/var/lib/postgresql/data
    networks:
      - aunsorm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aunsorm} -d ${POSTGRES_DB:-aunsorm_auth}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─── Aunsorm Gateway — Tek giriş noktası (host:50010 + aunsorm-network) ─
  # MyeOffice nginx:  host.docker.internal:50010 → gateway:80 → auth-service:50011
  # Zasian SFU:       aun-gateway:80             → auth-service:50011
  gateway:
    image: nginx:1.27-alpine
    container_name: aun-gateway
    depends_on:
      auth-service:
        condition: service_healthy
    ports:
      # ⚠️ KRİTİK: MyeOffice frontend stack bu porta bağlanır!
      # nginx.conf:       upstream aunsorm_api { server host.docker.internal:50010; }
      # nginx-https.conf: upstream aunsorm_api { server host.docker.internal:50010; }
      # docker-compose.yml: AUNSORM_INTERNAL_BASE_URL=http://host.docker.internal:50010
      - "50010:80"
    volumes:
      - ./nginx/zasian-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      aunsorm-network:
        aliases:
          - host.docker.internal
      # host.docker.internal alias'ı: Zasian SFU bu network'e katıldığında
      # host.docker.internal:50010 DNS sorgusu bu container'a gelir (port 50010'da dinliyor).
      # Zasian SFU compose'una tek ekleme:
      #   networks:
      #     aunsorm-network:
      #       external: true
      #       name: aunsorm-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Aunsorm Auth Service — Yalnızca iç network'te çalışır ─────────────
  # Dışarıya doğrudan port açmaz — tüm trafik gateway üzerinden geçer.
  auth-service:
    container_name: aun-auth-service
    build:
      context: ..
      dockerfile: docker/Dockerfile.auth
    env_file:
      - ../.env
    environment:
      # Servis modu — yalnızca Zasian endpoint'lerini açar
      SERVICE_MODE: auth-service
      AUNSORM_LISTEN: 0.0.0.0:50011

      # Zasian entegrasyon URL'leri
      # ZASIAN_WEBSOCKET_URL ve ZASIAN_HOST .env üzerinden gelir;
      # aşağıdaki satırları .env'e ekleyin:
      #   ZASIAN_WEBSOCKET_URL=wss://217.160.159.182:50036/zasian
      #   ZASIAN_HOST=217.160.159.182

      # SQLite ledger (PostgreSQL geçişi PROD_PLAN.md'de planlandı)
      # Şimdilik /srv/data/auth.db olarak volume'a yazılır.
      AUNSORM_LEDGER_PATH: /srv/data/auth.db

      # Log seviyesi
      RUST_LOG: ${RUST_LOG:-info}
      # ANSI renk kodlarını kapat (terminalde bozuk görünen \e[1m \e[0m karakterleri)
      NO_COLOR: "1"
    ports:
      - "50011:50011"
    volumes:
      - aunsorm-auth-data:/srv/data
    networks:
      - aunsorm-network
      # Zasian SFU bu network üzerinden doğrudan erişebilir:
      #   http://aun-auth-service:50011/security/jwt-verify
    # NOT: AUNSORM_LEDGER_PATH=SQLite kullandığı için postgres bağımlılığı yok.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50011/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Aunsorm E2EE Service — Zasian medya kanalları için uçtan uca şifreleme ─
  # Sağladığı endpoint'ler:
  #   POST /security/jwe/encrypt   — Medya paketi şifreleme
  #   POST /security/jwe/decrypt   — Medya paketi çözme
  #   POST /sfu/context            — E2EE oturum başlatma (HKDF anahtar türetme)
  #   POST /sfu/context/step       — ECDH anahtar değişimi adımı
  #
  # Zasian SFU bu servise ZASIAN_E2EE_URL üzerinden ulaşır:
  #   Container DNS: http://aun-e2ee-service:50021
  e2ee-service:
    container_name: aun-e2ee-service
    build:
      context: ..
      dockerfile: docker/Dockerfile.e2ee
    env_file:
      - ../.env
    environment:
      SERVICE_MODE: e2ee-service
      AUNSORM_LISTEN: 0.0.0.0:50021
      AUNSORM_LEDGER_PATH: /srv/data/e2ee.db
      RUST_LOG: ${RUST_LOG:-info}
      NO_COLOR: "1"
    ports:
      - "50021:50021"
    volumes:
      - aunsorm-e2ee-data:/srv/data
    networks:
      - aunsorm-network
      # Zasian SFU bu network üzerinden container DNS ile erişir:
      #   http://aun-e2ee-service:50021
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50021/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Aunsorm ID Service — Benzersiz/kriptografik ID üretimi ─────────────────────
  # Sağladığı endpoint'ler:
  #   POST /id/generate   — Kriptografik kimlik üretimi
  #   HEAD /id/generate   — Kapasite kontrol
  #
  # Zasian SFU bu servise ZASIAN_ID_URL üzerinden ulaşır:
  #   Container DNS: http://aun-id-service:50016
  id-service:
    container_name: aun-id-service
    build:
      context: ..
      dockerfile: docker/Dockerfile.id
    env_file:
      - ../.env
    environment:
      SERVICE_MODE: id-service
      AUNSORM_LISTEN: 0.0.0.0:50016
      RUST_LOG: ${RUST_LOG:-info}
      NO_COLOR: "1"
    ports:
      - "50016:50016"
    networks:
      - aunsorm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50016/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Aunsorm RNG Service — Harici RNG endpoint'i (fallback) ────────────────
  # NOT: Aunsorm servisleri önce AunsormNativeRng (HKDF+NEUDZ-PCS) kullanır.
  # Bu servis Native RNG başarısız olduğunda fallback veya harici istemciler
  # için mevcuttur. HTTP /random/number overhead'i 6.4s (vs native 1.5s).
  #
  # Sağladığı endpoint:
  #   GET /random/number   — Kriptografik rastgele sayı (fallback)
  rng-service:
    container_name: aun-rng-service
    build:
      context: ..
      dockerfile: docker/Dockerfile.rng
    env_file:
      - ../.env
    environment:
      SERVICE_MODE: rng-service
      AUNSORM_LISTEN: 0.0.0.0:50019
      RUST_LOG: ${RUST_LOG:-info}
      NO_COLOR: "1"
    ports:
      - "50019:50019"
    networks:
      - aunsorm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50019/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  aunsorm-pg-data:
    driver: local
  aunsorm-auth-data:
    driver: local
  aunsorm-e2ee-data:
    driver: local
  # id-service ve rng-service stateless — volume gerekmez.
