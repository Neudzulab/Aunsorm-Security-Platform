# Zasian Aunsorm Gateway — nginx reverse proxy
#
# Bu gateway iki amaca hizmet eder:
#   1. Host erişimi: MyeOffice nginx → host.docker.internal:50010 → bu gateway → auth-service:50011
#   2. Container erişimi: Zasian SFU → zasian-media-network → zasian-aunsorm-gateway:80 → auth-service:50011
#
# Zasian SFU compose dosyasına eklenecek:
#   networks:
#     zasian-media-network:
#       external: true
#       name: zasian-media-network

# WebSocket upgrade map — server bloğundan önce tanımlanmalı
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# Compose service adı kullanılır (container adı değil)
upstream aunsorm_auth {
    server auth-service:50011;
    keepalive 32;
}

server {
    # 80   — MyeOffice nginx → host.docker.internal:50010 → gateway:80
    # 50010 — Zasian SFU (container içi): host.docker.internal:50010 → gateway:50010
    #          Linux'ta host.docker.internal kendi başına çözümlenmiyor;
    #          zasian-media-network'te bu container'a alias ile yönlendiriliyor.
    listen 80;
    listen 50010;
    server_name _;

    # Bağlantı timeout'ları
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    location / {
        proxy_pass         http://aunsorm_auth;
        proxy_http_version 1.1;

        # WebSocket desteği (Zasian SFU signaling için)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Büyük JWT payload'ları için buffer ayarları
        proxy_buffer_size          16k;
        proxy_buffers              8 16k;
        proxy_busy_buffers_size    32k;
    }
}
